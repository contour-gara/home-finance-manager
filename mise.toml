[tools]
gradle = "9.3.1"
java = "corretto-21.0.10.7.1"
node = "24.13.1"

[env]
BOT_TOKEN = ""
ULID_SEQUENCER_DATASOURCE_URL = ""
DATASOURCE_USERNAME = ""
DATASOURCE_PASSWORD = ""
EXPENSES_API_DATASOURCE_URL = "jdbc:mysql://gateway01.ap-northeast-1.prod.aws.tidbcloud.com:4000/home_finance_manager_expenses_api_db?sslMode=VERIFY_IDENTITY"

[tasks.jdeps]
description = "Show module dependencies of jar"
run = """
gradle clean {{arg(name="module")}}:build -x test

if [ '{{flag(name='spring')}}' = 'true' ]; then
  readonly TMP_DIR="/tmp/app-jar"
  mkdir -p ${TMP_DIR}
  trap 'rm -rf ${TMP_DIR}' EXIT

  unzip -q {{arg(name="module")}}/build/libs/{{arg(name="module")}}.jar -d "${TMP_DIR}"

  jdeps \
    -classpath '${TMP_DIR}/BOOT-INF/lib/*:${TMP_DIR}/BOOT-INF/classes:${TMP_DIR}' \
    --print-module-deps \
    --ignore-missing-deps \
    --module-path ${TMP_DIR}/BOOT-INF/lib/javax.activation-api-1.2.0.jar \
    --recursive \
    --multi-release 21 \
    -quiet \
    ${TMP_DIR}/org ${TMP_DIR}/BOOT-INF/classes ${TMP_DIR}/BOOT-INF/lib/*.jar
else
  jdeps \
    --print-module-deps \
    --ignore-missing-deps \
    --recursive \
    --multi-release 21 \
    -quiet \
    {{arg(name="module")}}/build/libs/{{arg(name="module")}}.jar
fi
"""
